# SPDX-License-Identifier: MIT

### Resource consumption 12Gi, 19CPU (SMT ENABLED)

kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: "oai-physim"
  namespace: "oaicicd-ran"
spec:
    runPolicy: "Serial"
    nodeSelector:
        node-role.kubernetes.io/ran-base: ""
    source:
        type: "Binary"
    strategy:
        dockerStrategy:
            dockerfilePath: "docker/Dockerfile.phySim.rhel9"
    output:
        to:
            kind: "ImageStreamTag"
            name: "oai-physim:latest"
