# SPDX-License-Identifier: MIT

kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: "oai-gnb-aw2s"
  namespace: "oaicicd-ran"
spec:
    resources:
      limits:
        cpu: 2
        memory: 2Gi
      requests:
        cpu: 0.5
        memory: 1Gi
    nodeSelector:
        node-role.kubernetes.io/fhi72: ""
    runPolicy: "Serial"
    source:
        type: "Binary"
        configMaps:
          - configMap:
              name: aw2s-library
            destinationDir: libori.so
    strategy:
        dockerStrategy:
            dockerfilePath: "docker/Dockerfile.gNB.aw2s.rhel9"
    output:
        to:
            kind: "ImageStreamTag"
            name: "oai-gnb-aw2s:latest"
