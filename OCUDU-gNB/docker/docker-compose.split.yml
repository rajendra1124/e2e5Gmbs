services:
  gnb:
    # a gNB service is already defined in the base docker-compose.yml file.
    # This replaces it with a dummy service that does nothing
    # but builds the ocudu/gnb image so that the CU/DU services can reuse it.
    image: ocudu/gnb
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        OS: ${OS:-ubuntu}
        OS_VERSION: ${OS_VERSION:-24.04}
    networks: {}
    entrypoint: ["true"]

  cu-cp:
    container_name: ocudu_cu_cp
    image: ocudu/gnb
    networks:
      ran:
        ipv4_address: ${CU_CP_IP:-10.53.1.4}
    volumes:
      - gnb-storage:/tmp,subpath=cu_cp
    depends_on:
      gnb:
        condition: service_completed_successfully
      5gc:
        condition: service_healthy
    configs:
      - cu_cp_config.yml
      - cu_cp_compose_config.yml
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'for p in 38462 38472; do ss -l -H -A sctp "sport = :$p" | grep -q . || exit 1; done; exit 0',
        ]
      interval: 3s
      timeout: 1s
      retries: 60
    command: ocucp -c /cu_cp_config.yml -c /cu_cp_compose_config.yml

  cu-up:
    container_name: ocudu_cu_up
    image: ocudu/gnb
    networks:
      ran:
        ipv4_address: ${CU_UP_IP:-10.53.1.5}
      f1u:
        ipv4_address: ${CU_UP_F1U_IP:-172.18.10.2}
    volumes:
      - gnb-storage:/tmp,subpath=cu_up
    depends_on:
      gnb:
        condition: service_completed_successfully
      cu-cp:
        condition: service_healthy
    configs:
      - cu_up_config.yml
      - cu_up_compose_config.yml
    command: ocuup -c /cu_up_config.yml -c /cu_up_compose_config.yml

  du:
    container_name: ocudu_du
    image: ocudu/gnb
    privileged: true
    cap_add:
      - SYS_NICE
      - CAP_SYS_PTRACE
    volumes:
      - gnb-storage:/tmp,subpath=du
      - /dev/bus/usb/:/dev/bus/usb/
      - /usr/share/uhd/images:/usr/share/uhd/images
    networks:
      ran:
        ipv4_address: ${DU_IP:-10.53.1.6}
      f1u:
        ipv4_address: ${DU_F1U_IP:-172.18.10.3}
      metrics:
        ipv4_address: 172.19.1.3
    depends_on:
      gnb:
        condition: service_completed_successfully
      cu-cp:
        condition: service_healthy
    configs:
      - du_config.yml
      - du_compose_config.yml
    command: odu -c /du_config.yml -c /du_compose_config.yml

configs:
  cu_cp_config.yml:
    file: ${CUCP_CONFIG_PATH:-../configs/cu_cp.yml}
  cu_cp_compose_config.yml:
    content: |
      cu_cp:
        amf:
          addrs: ${OPEN5GS_IP:-10.53.1.2}
          bind_addrs: ${CU_CP_IP:-10.53.1.4}
        e1ap:
          bind_addrs: ${CU_CP_IP:-10.53.1.4}
        f1ap:
          bind_addrs: ${CU_CP_IP:-10.53.1.4}
  cu_up_config.yml:
    file: ${CUUP_CONFIG_PATH:-../configs/cu_up.yml}
  cu_up_compose_config.yml:
    content: |
      cu_up:
        e1ap:
          addrs: ${CU_CP_IP:-10.53.1.4}
          bind_addrs: ${CU_UP_IP:-10.53.1.5}
        f1u:
          socket:
            -
              bind_addr: ${CU_UP_F1U_IP:-172.18.10.2}
  du_config.yml:
    file: ${DU_CONFIG_PATH:-../configs/du_rf_b200_tdd_n78_20mhz.yml}
  du_compose_config.yml:
    content: |
      f1ap:
        addrs: ${CU_CP_IP:-10.53.1.4}
        bind_addrs: ${DU_IP:-10.53.1.6}
      f1u:
        socket:
          -
            bind_addr: ${DU_F1U_IP:-172.18.10.3}
      metrics:
        autostart_stdout_metrics: true
        enable_json: true
      remote_control:
        bind_addr: 0.0.0.0
        enabled: true

networks:
  f1u:
    name: f1u_network
    enable_ipv6: true
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "true"
    ipam:
      driver: default
      config:
        - subnet: "172.18.10.0/24"
        - subnet: fd00:0:0:10::/64
          gateway: fd00:0:0:10::1
