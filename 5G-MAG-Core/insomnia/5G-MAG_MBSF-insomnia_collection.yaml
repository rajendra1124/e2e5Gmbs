          text: >+
            {
              "mbsUserServId": "{{ _.mbs_user_service_id }}",
              "mbsDisSessInfos": {
                "AP_MBS_SESSION_1": {
                  "mbsSessionId": {
                    "ssm": {
                      "sourceIpAddr": {
                        "ipv4Addr": "127.10.11.23"
                      },
                      "destIpAddr": {
                        "ipv4Addr": "232.10.11.12"
                      }
                    }
                  },
                  "mbsDistSessState": "INACTIVE",
